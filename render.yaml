# render.yaml — CodeRoute Guinée
# Les variables marquées sync:false DOIVENT être saisies manuellement dans
# Render Dashboard → Environment avant le premier déploiement.
# Les variables generateValue:true sont auto-générées par Render.

services:
  # ── Backend FastAPI ──────────────────────────────────────────────────────
  - type: web
    name: coderoute-backend
    runtime: docker
    dockerContext: backend
    dockerfilePath: backend/Dockerfile
    plan: starter
    region: frankfurt
    healthCheckPath: /health
    envVars:
      - key: PYTHONPATH
        value: "/app"

      # Sécurité — OBLIGATOIRE : saisir dans Render Dashboard
      - key: SECRET_KEY
        generateValue: true
      - key: CSRF_SECRET
        generateValue: true
      - key: ADMIN_REGISTRATION_TOKEN
        generateValue: true

      # Base de données Neon — OBLIGATOIRE : saisir dans Render Dashboard
      # Format : postgresql+psycopg://USER:PASSWORD@HOST/DB?sslmode=require
      - key: DATABASE_URL
        sync: false
      - key: ALEMBIC_DATABASE_URL
        sync: false

      # Bootstrap admin — saisir dans Render Dashboard
      - key: BOOTSTRAP_ADMIN_EMAIL
        sync: false
      - key: BOOTSTRAP_ADMIN_PASSWORD
        sync: false
      - key: BOOTSTRAP_ADMIN_NAME
        value: "Directeur National CodeRoute"

      # Application
      - key: ENVIRONMENT
        value: "production"
      - key: ENABLE_API_DOCS
        value: "false"

      # CORS / Hosts — uniquement le domaine Render (pas de localhost)
      - key: CORS_ORIGINS
        value: "https://coderouteguinee-frontend.onrender.com"
      - key: ALLOWED_HOSTS
        value: "coderouteguinee-backend.onrender.com"

      # Email Brevo — optionnel pour le pilote
      - key: BREVO_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: "noreply@coderoute.gov.gn"
      - key: EMAIL_FROM_NAME
        value: "CodeRoute Guinée — DNTT"

      # Mobile Money — sandbox pour le pilote
      - key: MOBILE_MONEY_MODE
        value: "sandbox"

      # Performance DB
      - key: DB_POOL_RECYCLE
        value: "60"
      - key: DB_POOL_SIZE
        value: "2"
      - key: DB_MAX_OVERFLOW
        value: "3"

      # Durée tokens
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"

  # ── Frontend Vite ────────────────────────────────────────────────────────
  - type: web
    name: coderoute-frontend
    runtime: static
    buildCommand: "cd frontend && npm ci && npm run build"
    staticPublishPath: frontend/dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_API_BASE_URL
        value: "https://coderouteguinee-backend.onrender.com"
      - key: VITE_APP_ENV
        value: "production"
