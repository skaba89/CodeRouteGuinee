# render.yaml — CodeRoute Guinée
# Blueprint Render.com : Backend FastAPI (Docker) + Frontend React (Static)
# Doc : https://render.com/docs/blueprint-spec

services:

  # ── Backend FastAPI ────────────────────────────────────────────────────────
  - type: web
    name: coderoute-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: frankfurt
    plan: free

    envVars:
      - key: PROJECT_NAME
        value: "CodeRoute Guinee API"
      - key: API_V1_PREFIX
        value: "/api/v1"
      - key: PYTHONPATH
        value: "/app"
      - key: SECRET_KEY
        generateValue: true
      - key: CSRF_SECRET
        generateValue: true
      - key: ADMIN_REGISTRATION_TOKEN
        generateValue: true
      - key: BOOTSTRAP_ADMIN_FULL_NAME
        value: "Administrateur National DNTT"

      # Neon PostgreSQL — saisir manuellement dans Render Dashboard
      - key: DATABASE_URL
        sync: false
      - key: ALEMBIC_DATABASE_URL
        sync: false
      - key: BOOTSTRAP_ADMIN_EMAIL
        sync: false
      - key: BOOTSTRAP_ADMIN_PASSWORD
        sync: false

      # JWT
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "120"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "30"

      # CORS — ajuster avec l'URL réelle du frontend après déploiement
      - key: CORS_ORIGINS
        value: "https://coderoute-frontend.onrender.com"

      # Mobile Money
      - key: MOBILE_MONEY_MODE
        value: "sandbox"
      - key: ORANGE_MONEY_CLIENT_ID
        sync: false
      - key: ORANGE_MONEY_CLIENT_SECRET
        sync: false
      - key: ORANGE_MONEY_MERCHANT_CODE
        sync: false
      - key: MTN_MONEY_SUBSCRIPTION_KEY
        sync: false
      - key: MTN_MONEY_API_USER_ID
        sync: false
      - key: MTN_MONEY_API_KEY
        sync: false
      - key: MTN_MONEY_ENVIRONMENT
        value: "sandbox"
      - key: WAVE_API_KEY
        sync: false
      - key: WAVE_WEBHOOK_SECRET
        sync: false
      - key: WAVE_BASE_URL
        value: "https://api.wave.com"

      # SMS Orange
      - key: ORANGE_SMS_CLIENT_ID
        sync: false
      - key: ORANGE_SMS_CLIENT_SECRET
        sync: false
      - key: ORANGE_SMS_SENDER
        value: "CODEROUTE"

      # Sentry
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_ENVIRONMENT
        value: "production"
      - key: SENTRY_SAMPLE_RATE
        value: "0.2"

      # App
      - key: AUTO_CREATE_TABLES
        value: "false"
      - key: LOGIN_RATE_LIMIT_ATTEMPTS
        value: "5"
      - key: LOGIN_RATE_LIMIT_WINDOW_SECONDS
        value: "300"
      - key: ENVIRONMENT
        value: "production"

    healthCheckPath: /health
    autoDeploy: true

  # ── Frontend React SPA ─────────────────────────────────────────────────────
  - type: web
    name: coderoute-frontend
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: ./frontend/dist
    region: frankfurt
    plan: free

    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable

    routes:
      - type: rewrite
        source: /*
        destination: /index.html

    autoDeploy: true
