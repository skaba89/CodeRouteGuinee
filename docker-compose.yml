services:
  postgres:
    image: postgres:16-alpine
    container_name: coderoute-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-coderoute}
      POSTGRES_USER: ${POSTGRES_USER:-coderoute}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-coderoute}
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coderoute -d coderoute"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - coderoute-network

  backend:
    build: ./backend
    container_name: coderoute-backend
    env_file:
      - .env
    environment:
      # Important: inside Docker, the database hostname is the compose service name `postgres`.
      # This override prevents local .env values such as localhost/db from breaking seed scripts.
      PROJECT_NAME: ${PROJECT_NAME:-CodeRoute Guinée API}
      API_V1_PREFIX: ${API_V1_PREFIX:-/api/v1}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-120}
      LOGIN_RATE_LIMIT_ATTEMPTS: ${LOGIN_RATE_LIMIT_ATTEMPTS:-5}
      LOGIN_RATE_LIMIT_WINDOW_SECONDS: ${LOGIN_RATE_LIMIT_WINDOW_SECONDS:-300}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-coderoute}:${POSTGRES_PASSWORD:-coderoute}@postgres:5432/${POSTGRES_DB:-coderoute}
      AUTO_CREATE_TABLES: "false"
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 25s
    networks:
      - coderoute-network

  frontend:
    build: ./frontend
    container_name: coderoute-frontend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:${BACKEND_PORT:-8000}}
      VITE_API_URL: ${VITE_API_URL:-http://localhost:${BACKEND_PORT:-8000}/api/v1}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - coderoute-network

volumes:
  postgres_data:

networks:
  coderoute-network:
    driver: bridge
