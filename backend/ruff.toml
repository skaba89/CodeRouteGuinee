target-version = "py312"
line-length = 140

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
]
ignore = [
    "B008",  # FastAPI Depends() dans les paramètres par défaut
    "E501",  # Lignes longues (140 géré par line-length)
]

[lint.per-file-ignores]
"tests/**/*.py" = ["B", "F811"]
"alembic/**/*.py" = ["E501", "I001"]
