[tool.ruff]
target-version = "py312"
line-length = 140

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
    "S",   # flake8-bandit (sécurité)
    "N",   # pep8-naming
]
ignore = [
    "S101",   # assert utilisé dans les tests pytest
    "S105",   # hardcoded-password-string (faux positifs sur les noms de variables)
    "S106",
    "B008",   # do not perform function calls in default arguments (FastAPI Depends pattern)
    "N803",   # argument name should be lowercase (SQLAlchemy patterns)
]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["S", "B"]  # sécurité assouplie dans les tests
"alembic/**/*.py" = ["E501", "I"]
