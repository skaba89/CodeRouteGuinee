name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: admin-finance
            test_file: tests/test_e2e_admin_finance.py
          - name: candidate-booking
            test_file: tests/test_e2e_candidate_booking.py
          - name: candidate-full-flow
            test_file: tests/test_e2e_candidate_full_flow.py
          - name: exam-certificate
            test_file: tests/test_e2e_exam_certificate.py
    name: backend-tests (${{ matrix.name }})
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install backend dependencies
        working-directory: backend
        run: pip install -q -r requirements.txt
      - name: Run backend tests
        working-directory: backend
        run: pytest -q --tb=short --disable-warnings ${{ matrix.test_file }}

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install
      - name: Build frontend
        working-directory: frontend
        run: npm run build
