name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install ruff
        run: pip install -q ruff
      - name: Lint backend
        working-directory: backend
        run: ruff check app/ tests/

  backend-tests:
    runs-on: ubuntu-latest
    needs: [backend-lint]
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: admin-finance
            test_file: tests/test_e2e_admin_finance.py
          - name: antifraud-dashboard
            test_file: tests/test_e2e_antifraud_dashboard.py
          - name: candidate-booking
            test_file: tests/test_e2e_candidate_booking.py
          - name: candidate-full-flow
            test_file: tests/test_e2e_candidate_full_flow.py
          - name: center-incident-recovery
            test_file: tests/test_e2e_center_incident_recovery.py
          - name: center-stations-registry
            test_file: tests/test_e2e_center_stations_registry.py
          - name: device-session-tracking
            test_file: tests/test_e2e_device_session_tracking.py
          - name: exam-certificate
            test_file: tests/test_e2e_exam_certificate.py
          - name: exam-monitoring-events
            test_file: tests/test_e2e_exam_monitoring_events.py
          - name: exam-question-trace
            test_file: tests/test_e2e_exam_question_trace.py
          - name: manual-review-decisions
            test_file: tests/test_e2e_manual_review_decisions.py
          - name: institutional-pilot-recipe
            test_file: tests/test_e2e_institutional_pilot_recipe.py
          - name: candidate-center-multimedia-exam
            test_file: tests/test_e2e_candidate_center_multimedia_exam.py
          - name: next-feature-69
            test_file: tests/test_e2e_candidate_submissions.py
          - name: dashboard-exports
            test_file: tests/test_dashboard_export.py
          - name: pdf-service
            test_file: tests/test_pdf_service.py
          - name: health-readiness
            test_file: tests/test_health.py
          - name: deploy-preflight
            test_file: tests/test_deploy_preflight.py
          - name: postgres-backup-tooling
            test_file: tests/test_postgres_backup_script.py
          - name: operations-summary
            test_file: tests/test_operations_summary.py
          - name: center-governance
            test_file: tests/test_center_governance.py
          - name: question-governance
            test_file: tests/test_question_governance.py
          - name: candidate-official-import
            test_file: tests/test_candidate_official_import.py
          - name: payment-official-import
            test_file: tests/test_payment_official_import.py
    name: backend-tests (${{ matrix.name }})
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install backend dependencies
        working-directory: backend
        run: pip install -q -r requirements.txt
      - name: Run backend tests
        working-directory: backend
        env:
          PYTHONPATH: .
        run: |
          set +e
          pytest -q --tb=short --disable-warnings ${{ matrix.test_file }} > pytest-output.txt 2>&1
          status=$?
          cat pytest-output.txt
          exit $status
      - name: Upload backend test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-${{ matrix.name }}
          path: backend/pytest-output.txt

  backend-coverage:
    runs-on: ubuntu-latest
    needs: [backend-lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install backend dependencies
        working-directory: backend
        run: pip install -q -r requirements.txt
      - name: Run coverage
        working-directory: backend
        env:
          PYTHONPATH: .
        run: |
          pytest tests/ \
            --ignore=tests/test_health.py \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=80 \
            -q --tb=short --disable-warnings
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage.xml

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Typecheck frontend
        working-directory: frontend
        run: npm run typecheck
      - name: Build frontend
        working-directory: frontend
        run: npm run build

  frontend-ui-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Run Playwright smoke tests
        working-directory: frontend
        run: npm run test:e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report

  release-preflight:
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-tests, backend-coverage, frontend-build, frontend-ui-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Create hardened production env sample
        run: |
          cat > production.ci.env <<'EOF'
          ENVIRONMENT=production
          SECRET_KEY=ci-secret-key-with-more-than-32-characters
          ADMIN_REGISTRATION_TOKEN=private-admin-bootstrap-token
          DATABASE_URL=postgresql+psycopg://coderoute:strong@postgres:5432/coderoute
          AUTO_CREATE_TABLES=false
          CORS_ORIGINS=https://coderoute.gov.gn,https://admin.coderoute.gov.gn
          ALLOWED_HOSTS=api.coderoute.gov.gn
          ENABLE_API_DOCS=false
          POSTGRES_PASSWORD=strong-postgres-password-not-default
          BACKUP_RETENTION_DAYS=30
          BACKUP_ENCRYPTION_REQUIRED=true
          BOOTSTRAP_ADMIN_EMAIL=admin@coderoute.gov.gn
          BOOTSTRAP_ADMIN_PASSWORD=strong-bootstrap-password
          VITE_API_BASE_URL=https://api.coderoute.gov.gn
          EOF
      - name: Run production preflight
        run: python scripts/preflight_deploy.py --env-file production.ci.env --target production
