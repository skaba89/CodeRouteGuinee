name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: admin-finance
            test_file: tests/test_e2e_admin_finance.py
          - name: antifraud-dashboard
            test_file: tests/test_e2e_antifraud_dashboard.py
          - name: candidate-booking
            test_file: tests/test_e2e_candidate_booking.py
          - name: candidate-full-flow
            test_file: tests/test_e2e_candidate_full_flow.py
          - name: center-incident-recovery
            test_file: tests/test_e2e_center_incident_recovery.py
          - name: device-session-tracking
            test_file: tests/test_e2e_device_session_tracking.py
          - name: exam-certificate
            test_file: tests/test_e2e_exam_certificate.py
          - name: exam-monitoring-events
            test_file: tests/test_e2e_exam_monitoring_events.py
          - name: manual-review-decisions
            test_file: tests/test_e2e_manual_review_decisions.py
    name: backend-tests (${{ matrix.name }})
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install backend dependencies
        working-directory: backend
        run: pip install -q -r requirements.txt
      - name: Run backend tests
        working-directory: backend
        env:
          PYTHONPATH: .
        run: |
          set +e
          pytest -q --tb=short --disable-warnings ${{ matrix.test_file }} > pytest-output.txt 2>&1
          status=$?
          cat pytest-output.txt
          exit $status
      - name: Upload backend test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-${{ matrix.name }}
          path: backend/pytest-output.txt

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install
      - name: Build frontend
        working-directory: frontend
        run: npm run build

  frontend-ui-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install
      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Run Playwright smoke tests
        working-directory: frontend
        run: npm run test:e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
