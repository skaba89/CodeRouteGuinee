name: Backup PostgreSQL

on:
  schedule:
    - cron: '0 2 * * *'   # Chaque jour à 02h00 UTC (03h00 Conakry)
  workflow_dispatch:        # Déclenchement manuel

jobs:
  backup:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       coderoute
          POSTGRES_USER:     coderoute
          POSTGRES_PASSWORD: ci-backup-test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pg_dump
        run: sudo apt-get install -y postgresql-client

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -q -r requirements.txt

      - name: Run migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql+psycopg://coderoute:ci-backup-test@localhost:5432/coderoute
          AUTO_CREATE_TABLES: "true"
          ENVIRONMENT: development
        run: alembic upgrade head

      - name: Run backup
        env:
          DATABASE_URL: postgresql+psycopg://coderoute:ci-backup-test@localhost:5432/coderoute
          BACKUP_DIR:   /tmp/coderoute-backups
        run: |
          python scripts/postgres_backup.py \
            --backup-dir /tmp/coderoute-backups \
            --retention-days 7

      - name: Verify backup integrity
        env:
          BACKUP_DIR: /tmp/coderoute-backups
        run: |
          python scripts/postgres_backup.py \
            --backup-dir /tmp/coderoute-backups \
            --verify

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}
          path: /tmp/coderoute-backups/
          retention-days: 7

  # Job de notification si le backup échoue
  notify-failure:
    runs-on: ubuntu-latest
    needs: [backup]
    if: failure()
    steps:
      - name: Backup failure notification
        run: |
          echo "⚠️ Backup PostgreSQL a échoué le $(date '+%d/%m/%Y à %H:%M')"
          echo "Vérifier : https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
