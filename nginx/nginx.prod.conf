# nginx.prod.conf — CodeRoute Guinée
# Optimisé pour 5 000+ connexions simultanées
#
# Capacité de cette config :
#   worker_processes auto    → 1 process Nginx par CPU
#   worker_connections 4096  → 4 096 connexions par process
#   Total max : CPU × 4096 connexions Nginx simultanées
#
# Rate limiting (protection anti-DDoS et anti-brute-force) :
#   zone api  : 120 req/min/IP (2 req/s) — navigation normale
#   zone auth : 20  req/min/IP           — anti-brute-force login
#   zone exam : 60  req/min/IP (1 req/s) — soumission exam (candidat légitime)

worker_processes      auto;
worker_rlimit_nofile  65535;   # limite fichiers ouverts par process Nginx
error_log             /var/log/nginx/error.log warn;
pid                   /var/run/nginx.pid;

events {
    worker_connections  4096;          # connexions simultanées par worker (était 1024)
    use                 epoll;         # Linux: epoll > select/poll
    multi_accept        on;            # accepter plusieurs connexions par wake-up
    accept_mutex        off;           # pas de mutex si les workers ont epoll
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging JSON ──────────────────────────────────────────────
    log_format json_access escape=json
        '{"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$uri",'
        '"status":$status,'
        '"bytes":$body_bytes_sent,'
        '"duration":$request_time,'
        '"upstream_time":"$upstream_response_time",'
        '"user_agent":"$http_user_agent",'
        '"ref":"$http_referer"}';

    access_log /var/log/nginx/access.log json_access buffer=64k flush=5s;

    # ── Performance réseau ────────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;     # envoyer les headers + début du body en un seul paquet
    tcp_nodelay         on;     # désactiver Nagle sur les connexions keepalive
    server_tokens       off;
    client_max_body_size 10M;

    # ── Timeouts ──────────────────────────────────────────────────
    keepalive_timeout       75s;    # garde la connexion TCP ouverte 75s
    keepalive_requests      1000;   # max requêtes par connexion keepalive
    client_header_timeout   10s;
    client_body_timeout     30s;
    send_timeout            30s;
    reset_timedout_connection on;   # libère les sockets clients qui ne répondent plus

    # ── Buffers ───────────────────────────────────────────────────
    client_header_buffer_size   2k;
    large_client_header_buffers 4 8k;
    output_buffers              2 32k;
    postpone_output             1460;  # MTU Ethernet

    # ── Gzip ──────────────────────────────────────────────────────
    gzip                on;
    gzip_vary           on;
    gzip_proxied        any;
    gzip_comp_level     5;
    gzip_min_length     1024;
    gzip_buffers        16 8k;
    gzip_types
        text/plain text/css text/xml
        application/json application/javascript application/xml+rss
        application/wasm font/woff2 image/svg+xml;

    # ── Cache open file ───────────────────────────────────────────
    open_file_cache          max=10000 inactive=30s;
    open_file_cache_valid    60s;
    open_file_cache_min_uses 2;
    open_file_cache_errors   on;

    # ── Rate limiting — zones ─────────────────────────────────────
    # api  : navigation normale (120 req/min = 2 req/s)
    # auth : anti-brute-force  (20  req/min)
    # exam : soumission examen (60  req/min = 1 req/s)
    limit_req_zone $binary_remote_addr zone=api:20m  rate=120r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=20r/m;
    limit_req_zone $binary_remote_addr zone=exam:10m rate=60r/m;
    limit_req_status 429;
    limit_conn_zone  $binary_remote_addr zone=conn_per_ip:10m;

    # ── Upstream backend — pool de connexions keepalive ───────────
    upstream backend {
        server    backend:8000;
        keepalive 128;              # connexions keepalive vers Gunicorn (était 32)
        keepalive_requests  10000;  # requêtes max par connexion keepalive upstream
        keepalive_timeout   60s;
    }

    upstream frontend {
        server    frontend:4173;
        keepalive 32;
        keepalive_timeout 30s;
    }

    # ── HTTP → HTTPS ──────────────────────────────────────────────
    server {
        listen      80;
        server_name api.coderoute.gov.gn coderoute.gov.gn admin.coderoute.gov.gn;
        return      301 https://$host$request_uri;
    }

    # ── API — api.coderoute.gov.gn ────────────────────────────────
    server {
        listen      443 ssl http2;
        server_name api.coderoute.gov.gn;

        ssl_certificate      /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key  /etc/nginx/certs/privkey.pem;
        ssl_protocols        TLSv1.2 TLSv1.3;
        ssl_ciphers          ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;
        ssl_session_cache    shared:SSL:20m;      # était 10m
        ssl_session_timeout  1d;
        ssl_session_tickets  off;                 # sécurité PFS
        ssl_stapling         on;
        ssl_stapling_verify  on;

        # ── Headers sécurité API ───────────────────────────────────
        add_header Strict-Transport-Security   "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options      "nosniff"                                      always;
        add_header X-Frame-Options             "DENY"                                          always;
        add_header Referrer-Policy             "strict-origin-when-cross-origin"               always;
        add_header Permissions-Policy          "camera=(), microphone=(), geolocation=()"      always;
        add_header X-Permitted-Cross-Domain-Policies "none"                                    always;
        add_header Content-Security-Policy     "default-src 'none'; frame-ancestors 'none';"  always;

        # Limite connexions simultanées par IP (anti-DoS couche TCP)
        limit_conn conn_per_ip 50;

        # ── Proxy commun (snippet réutilisé) ──────────────────────
        proxy_http_version        1.1;
        proxy_set_header Connection "";            # keepalive upstream
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID      $request_id;

        # Buffers proxy (réduit la charge mémoire sur Gunicorn)
        proxy_buffering           on;
        proxy_buffer_size         8k;
        proxy_buffers             8 16k;
        proxy_busy_buffers_size   32k;
        proxy_temp_file_write_size 64k;

        # ── Auth — rate limit strict ───────────────────────────────
        location /api/v1/auth/ {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass         http://backend;
            proxy_read_timeout 30s;
        }

        # ── Examen — anti-replay ───────────────────────────────────
        location ~ ^/api/v1/exams/.*/submit {
            limit_req zone=exam burst=3 nodelay;
            proxy_pass         http://backend;
            proxy_read_timeout 60s;
        }

        # ── Health — pas de rate limit, pas de log ─────────────────
        location /health {
            proxy_pass         http://backend;
            proxy_read_timeout 5s;
            access_log         off;
        }

        # ── API générale ──────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=30 nodelay;
            proxy_pass         http://backend;
            proxy_read_timeout 45s;

            # Cache des réponses GET publiques (health, stats)
            # Les endpoints protégés (Authorization header) ne sont pas mis en cache
            proxy_cache_bypass $http_authorization;
            proxy_no_cache     $http_authorization;
        }
    }

    # ── Frontend — coderoute.gov.gn ───────────────────────────────
    server {
        listen      443 ssl http2;
        server_name coderoute.gov.gn admin.coderoute.gov.gn;

        ssl_certificate      /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key  /etc/nginx/certs/privkey.pem;
        ssl_protocols        TLSv1.2 TLSv1.3;
        ssl_ciphers          ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache    shared:SSL:20m;
        ssl_stapling         on;
        ssl_stapling_verify  on;

        # ── Headers sécurité frontend ──────────────────────────────
        add_header Strict-Transport-Security   "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options      "nosniff"                                      always;
        add_header X-Frame-Options             "DENY"                                          always;
        add_header Referrer-Policy             "strict-origin-when-cross-origin"               always;
        add_header Permissions-Policy          "camera=(self), microphone=(), geolocation=()"  always;
        add_header X-Permitted-Cross-Domain-Policies "none"                                    always;
        add_header Content-Security-Policy
            "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' https://api.coderoute.gov.gn; media-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests;"
            always;

        limit_conn conn_per_ip 20;

        # ── Assets statiques — cache long terme (1 an) ─────────────
        location ~* \.(js|css|woff2|woff|ttf|png|svg|ico|webp|wasm)$ {
            proxy_pass         http://frontend;
            proxy_set_header   Host $host;
            expires            1y;
            add_header         Cache-Control "public, immutable";
            add_header         Content-Security-Policy "default-src 'none'" always;
            access_log         off;           # pas de log pour les assets
        }

        # ── Manifest + SW — pas de cache ──────────────────────────
        location ~* (manifest\.json|sw\.js)$ {
            proxy_pass         http://frontend;
            proxy_set_header   Host $host;
            expires            off;
            add_header         Cache-Control "no-store";
        }

        # ── SPA fallback ──────────────────────────────────────────
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
