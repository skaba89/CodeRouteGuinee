worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format json_access escape=json
        '{"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$uri",'
        '"status":$status,'
        '"bytes":$body_bytes_sent,'
        '"duration":$request_time,'
        '"user_agent":"$http_user_agent",'
        '"ref":"$http_referer"}';

    access_log /var/log/nginx/access.log json_access;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 10M;
    server_tokens off;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/wasm font/woff2;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m  rate=30r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=exam:10m rate=5r/m;

    # ── Headers de sécurité communs ──────────────────────────────
    # Appliqués sur chaque server block via map (évite la duplication)

    upstream backend  { server backend:8000;  keepalive 32; }
    upstream frontend { server frontend:4173; keepalive 16; }

    # ── HTTP → HTTPS ─────────────────────────────────────────────
    server {
        listen 80;
        server_name api.coderoute.gov.gn coderoute.gov.gn admin.coderoute.gov.gn;
        return 301 https://$host$request_uri;
    }

    # ── API — api.coderoute.gov.gn ────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name api.coderoute.gov.gn;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_stapling        on;
        ssl_stapling_verify on;

        # ── Headers sécurité API ───────────────────────────────────
        add_header Strict-Transport-Security   "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options      "nosniff"                                      always;
        add_header X-Frame-Options             "DENY"                                          always;
        add_header Referrer-Policy             "strict-origin-when-cross-origin"               always;
        add_header Permissions-Policy          "camera=(), microphone=(), geolocation=()"      always;
        add_header X-Permitted-Cross-Domain-Policies "none"                                    always;

        # CSP API : pas de ressources navigateur — stricte
        add_header Content-Security-Policy
            "default-src 'none'; frame-ancestors 'none';"
            always;

        # ── Auth (rate limit strict) ───────────────────────────────
        location /api/v1/auth/ {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass http://backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # ── Examens (rate limit dédié anti-replay) ────────────────
        location ~ ^/api/v1/exams/.*/submit {
            limit_req zone=exam burst=2 nodelay;
            proxy_pass http://backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # ── API générale ──────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 45s;
            proxy_buffering on;
            proxy_buffer_size 8k;
        }

        location /health {
            proxy_pass http://backend;
            access_log off;
        }
    }

    # ── Frontend — coderoute.gov.gn ───────────────────────────────
    server {
        listen 443 ssl http2;
        server_name coderoute.gov.gn admin.coderoute.gov.gn;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_stapling        on;
        ssl_stapling_verify on;

        # ── Headers sécurité frontend ──────────────────────────────
        add_header Strict-Transport-Security   "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options      "nosniff"                                      always;
        add_header X-Frame-Options             "DENY"                                          always;
        add_header Referrer-Policy             "strict-origin-when-cross-origin"               always;
        add_header Permissions-Policy          "camera=(self), microphone=(), geolocation=()"  always;
        add_header X-Permitted-Cross-Domain-Policies "none"                                    always;

        # ── CSP frontend — politique stricte ──────────────────────
        # script-src 'self' uniquement : pas de CDN, pas d'inline JS injecté
        # style-src  'unsafe-inline' : nécessaire pour les styles Vite/React en prod
        # connect-src : API backend uniquement
        # frame-ancestors 'none' : anti-clickjacking
        add_header Content-Security-Policy
            "default-src 'self';"
            "script-src 'self';"
            "style-src 'self' 'unsafe-inline';"
            "img-src 'self' data: blob:;"
            "font-src 'self';"
            "connect-src 'self' https://api.coderoute.gov.gn;"
            "media-src 'none';"
            "object-src 'none';"
            "base-uri 'self';"
            "form-action 'self';"
            "frame-ancestors 'none';"
            "upgrade-insecure-requests;"
            always;

        # ── Assets statiques — cache long terme ───────────────────
        location ~* \.(js|css|woff2|woff|ttf|png|svg|ico|webp)$ {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            expires 1y;
            add_header Cache-Control "public, immutable";
            # Surcharger CSP pour les assets (pas de JS à exécuter)
            add_header Content-Security-Policy "default-src 'none'" always;
        }

        # ── manifest.json + service worker — pas de cache ────────
        location ~* (manifest\.json|sw\.js)$ {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            expires off;
            add_header Cache-Control "no-store";
        }

        # ── SPA fallback ──────────────────────────────────────────
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
