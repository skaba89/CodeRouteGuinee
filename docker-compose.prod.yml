services:
  postgres:
    image: postgres:16-alpine
    container_name: coderoute-postgres-prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    expose:
      - "5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - coderoute-internal

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: coderoute-backend-prod
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      AUTO_CREATE_TABLES: "false"
      ENVIRONMENT: "production"
      ENABLE_API_DOCS: "false"
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s
    restart: unless-stopped
    networks:
      - coderoute-internal

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: coderoute-frontend-prod
    expose:
      - "4173"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - coderoute-internal

  nginx:
    image: nginx:1.27-alpine
    container_name: coderoute-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - coderoute-internal

volumes:
  postgres_data_prod:

networks:
  coderoute-internal:
    driver: bridge
